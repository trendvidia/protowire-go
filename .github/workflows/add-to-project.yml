name: Add to AppViewer Platform project

# Free-plan replacement for the built-in "Auto-add to project" workflow
# (Team/Enterprise only): any issue labeled design-tool or ota is added to
# https://github.com/users/trendvidia/projects/1. Adding an existing item
# is a no-op, so re-labeling is harmless.

on:
  issues:
    types: [opened, labeled, reopened]

jobs:
  add-to-project:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/add-to-project@v2.0.0
        with:
          project-url: https://github.com/users/trendvidia/projects/1
          github-token: ${{ secrets.ADD_TO_PROJECT_PAT }}
          labeled: design-tool, ota
          label-operator: OR

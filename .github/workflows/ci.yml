name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: test (go ${{ matrix.go }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        go: ['1.25.x', '1.26.x']
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}
          check-latest: true
          cache: true

      - name: go version
        run: go version

      - name: gofmt
        run: |
          unformatted="$(gofmt -s -l .)"
          if [ -n "$unformatted" ]; then
            echo "::error::Files need gofmt -s:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go test (race)
        run: go test -race -count=1 ./...

      - name: go test (coverage)
        if: matrix.os == 'ubuntu-latest' && matrix.go == '1.26.x'
        run: go test -count=1 -coverprofile=coverage.out -covermode=atomic ./...

      - name: upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.go == '1.26.x'
        uses: codecov/codecov-action@v7
        with:
          files: ./coverage.out
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  vuln:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'
          check-latest: true
          cache: true
      - name: install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: run govulncheck
        run: govulncheck ./...

  staticcheck:
    name: staticcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'
          check-latest: true
          cache: true
      - name: install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest
      - name: run staticcheck
        run: staticcheck ./...

  fuzz:
    name: fuzz (smoke, ${{ matrix.pkg }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pkg:
          - ./encoding/pxf
          - ./encoding/pb
          - ./encoding/sbe
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'
          check-latest: true
          cache: true
      - name: short fuzz run
        run: |
          tests=$(go test -list 'Fuzz.*' ${{ matrix.pkg }} | grep '^Fuzz' || true)
          for t in $tests; do
            echo "=== $t ==="
            go test -run='^$' -fuzz="^${t}$" -fuzztime=15s ${{ matrix.pkg }}
          done

  # Aggregate gate for branch protection: the "main protection — port" ruleset
  # requires this single context instead of enumerating matrix job names
  # (which change with every Go version bump and can never all be listed).
  ci-ok:
    name: ci-ok
    if: always()
    needs: [test, vuln, staticcheck, fuzz]
    runs-on: ubuntu-latest
    steps:
      - name: all required jobs succeeded
        run: |
          results='${{ join(needs.*.result, ' ') }}'
          echo "needs results: $results"
          for r in $results; do
            [ "$r" = "success" ] || { echo "a required job did not succeed"; exit 1; }
          done
